name: Jackton Daily Docker Cluster
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  run-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create .env file from Secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "REDIS_HOST=redis" >> .env
          # Tambahkan API key lain jika diperlukan oleh cluster Anda

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Build and Run Cluster
        run: |
          docker compose version
          # Jalankan cluster dengan 2 worker secara eksplisit
          docker compose up --build --scale worker=2 --abort-on-container-exit --exit-code-from worker
          
      - name: Show Logs on Failure
        if: failure()
        run: docker compose logs

      - name: Shutdown Cluster
        if: always()
        run: docker-compose down
