name: Jackton Daily Docker Cluster
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  run-cluster:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REDIS_HOST: redis
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 1. Start Redis
        run: docker compose up -d redis

      - name: 2. Run Master Orchestrator (Inject URLs)
        run: |
          # Jalankan Master sampai dia sukses keluar sendiri (exit 0)
          docker compose run master
          
      - name: 3. Run Worker Nodes (Scrape & Upload)
        run: |
          # Jalankan 2 worker. Berhenti jika idle sesuai settings.py
          docker compose up --scale worker=2 --abort-on-container-exit --exit-code-from worker worker

      - name: Show Logs on Failure
        if: failure()
        run: docker compose logs

      - name: Shutdown Cluster
        if: always()
        run: docker compose down
