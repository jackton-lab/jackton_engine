name: Jackton Daily - Full Pipeline (Original Flow)
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create necessary directories
        run: |
          mkdir -p project_2_rumah123/brankas_data/mentah
          mkdir -p project_2_rumah123/brankas_data/bersih

      - name: 1. Build & Run Scrapy (Tarik Mentah Massal)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          docker compose up -d redis
          # Worker menarik data ke Redis secara paralel
          docker compose up --build --scale worker=2 --abort-on-container-exit --exit-code-from worker worker

      - name: 2. Collect Results to JSON (Final Collector)
        run: |
          # Ambil semua data dari Redis dan simpan ke file properti_mentah.json
          docker compose run --workdir /app worker python3 core/final_collector.py
          
          # Ambil file mentah dari kontainer ke workspace GitHub
          CONTAINER_ID=$(docker ps -a --filter "label=com.docker.compose.service=worker" --format "{{.ID}}" | head -n 1)
          docker cp $CONTAINER_ID:/app/brankas_data/mentah/properti_mentah.json project_2_rumah123/brankas_data/mentah/
          
          # VALIDASI: Cek apakah file ada dan tidak kosong
          if [ ! -s project_2_rumah123/brankas_data/mentah/properti_mentah.json ]; then
            echo "::error::File properti_mentah.json kosong atau tidak ditemukan! Scraping gagal."
            exit 1
          fi

      - name: 3. Run AI Analysis (Proses Neural Engine V62)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pip install groq python-dotenv
          # Jalankan AI dengan logging yang lebih baik
          python3 project_2_rumah123/2_ai.py || echo "AI Analysis partially failed, continuing to upload what we have..."

      - name: 4. Run Supabase Upload (Sinkronisasi V60)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install supabase
          # Jalankan upload
          python3 project_2_rumah123/4_upload.py

      - name: 5. Archive Data to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add project_2_rumah123/brankas_data/
          git commit -m "Auto-archive: Detailed Property Data $(date)" || echo "No changes"
          git push

      - name: Cleanup
        if: always()
        run: docker compose down
