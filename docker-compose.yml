version: '3.8'

services:
  # MESSAGE BROKER (Sistem Otak Pusat)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # MASTER ORCHESTRATOR (Mengantrekan Jutaan URL ke Redis)
  master:
    build: ./project_2_rumah123/cluster
    depends_on:
      - redis
    env_file:
      - .env
    command: /app/wait-for-it.sh redis python /app/core/master_orchestrator.py

  # WORKER NODES (Pasukan Eksekutor - Bisa Di-Scale via Docker Swarm/K8s)
  worker:
    build: ./project_2_rumah123/cluster
    depends_on:
      - redis
    env_file:
      - .env
    # Jalankan Spider menggunakan perintah crawl agar settings.py terbaca sempurna
    command: /app/wait-for-it.sh redis scrapy crawl rumah123_spider
    deploy:
      mode: replicated
      replicas: 2 # Dikurangi dari 5 menjadi 2 agar tidak melebihi limit memori GitHub Actions (7GB RAM)

volumes:
  redis_data:
